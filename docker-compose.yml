version: '3.8'

services:
  db:
    image: postgis/postgis:15-3.3
    container_name: urbanflow-db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: urbanflow
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    networks:
      - urbanflow-network

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: urbanflow-backend
    ports:
      - "5000:5000"
    environment:
      - PORT=5000
      - DATABASE_URL=postgresql://postgres:postgres@db:5432/urbanflow
      - NODE_ENV=development
    volumes:
      - ./backend:/app
      - /app/node_modules
    depends_on:
      - db
    networks:
      - urbanflow-network

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: urbanflow-frontend
    ports:
      - "5173:5173"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    environment:
      - VITE_API_URL=http://localhost:5000
    depends_on:
      - backend
    networks:
      - urbanflow-network

networks:
  urbanflow-network:
    driver: bridge

volumes:
  pgdata:
    driver: local
